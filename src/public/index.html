<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradutor de Código</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <span class="header-icon">&lt;/&gt;</span>
      <h1>Tradutor de Código</h1>
    </div>
    <div class="header-right">
      <span class="badge">powered by IA</span>
      <span id="userEmail" class="user-email"></span>
      <span id="usageCount" class="usage-count"></span>
      <button id="btnHistorico" class="btn-ghost-sm">⏱ Histórico</button>
      <button id="btnLogout" class="btn-logout">Sair</button>
    </div>
  </header>

  <!-- Painel de histórico -->
  <div id="historicoOverlay" class="historico-overlay hidden"></div>
  <div id="historicoPanel" class="historico-panel hidden">
    <div class="historico-header">
      <span class="historico-title">Histórico</span>
      <div class="historico-header-actions">
        <button id="btnLimparHistorico" class="btn-ghost-sm">Limpar tudo</button>
        <button id="btnFecharHistorico" class="btn-ghost-sm">✕</button>
      </div>
    </div>
    <div id="historicoLista" class="historico-lista"></div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button id="tabTradutor" class="tab-btn tab-active">Tradutor</button>
    <button id="tabComparador" class="tab-btn">Comparador</button>
  </div>

  <!-- ── TRADUTOR ─────────────────────────────────────────────────────────── -->
  <main id="tradutorSection">
    <!-- Painel esquerdo -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Código</span>
        <div class="lang-select">
          <label for="linguagem">Linguagem:</label>
          <button id="btnDetectar" class="btn-ghost-sm">⚡ Detectar</button>
          <select id="linguagem">
            <option>SQL</option>
            <option>Python</option>
            <option>JavaScript</option>
            <option>TypeScript</option>
            <option>Java</option>
            <option>C#</option>
            <option>C / C++</option>
            <option>PHP</option>
            <option>Ruby</option>
            <option>Go</option>
            <option>Shell / Bash</option>
            <option>HTML / CSS</option>
            <option>Kotlin</option>
            <option>Swift</option>
            <option>Rust</option>
            <option>JSON</option>
          </select>
        </div>
      </div>
      <textarea id="inputCodigo" spellcheck="false" placeholder="Cole seu código aqui...&#10;&#10;Ctrl+Enter para traduzir"></textarea>
      <div id="codeColored" class="code-colored hidden">
        <div class="code-colored-header">
          <span>Código destacado</span>
          <button id="btnEditar" class="btn-ghost-sm">✏ Editar</button>
        </div>
        <div id="codeColoredContent" class="code-colored-content"></div>
      </div>
    </div>

    <!-- Painel direito -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title output-title">Tradução em Português</span>
        <button id="btnCopiar" class="btn-secondary">Copiar</button>
      </div>
      <div id="outputTraducao" class="output-box"></div>
    </div>
  </main>

  <!-- ── COMPARADOR ──────────────────────────────────────────────────────── -->
  <main id="comparadorSection" class="hidden">
    <!-- Painel esquerdo: código original -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Código Original</span>
        <div class="lang-select">
          <label for="cmpLingOrigem">De:</label>
          <button id="btnDetectarCmp" class="btn-ghost-sm">⚡ Detectar</button>
          <select id="cmpLingOrigem">
            <option>Python</option>
            <option>JavaScript</option>
            <option>TypeScript</option>
            <option>Java</option>
            <option>C#</option>
            <option>C / C++</option>
            <option>PHP</option>
            <option>Ruby</option>
            <option>Go</option>
            <option>Shell / Bash</option>
            <option>HTML / CSS</option>
            <option>Kotlin</option>
            <option>Swift</option>
            <option>Rust</option>
            <option>SQL</option>
          </select>
        </div>
      </div>
      <textarea id="inputComparador" spellcheck="false" placeholder="Cole o código que deseja converter...&#10;&#10;Ctrl+Enter para converter"></textarea>
    </div>

    <!-- Painel direito: código convertido -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title output-title">Código Convertido</span>
        <div class="lang-select">
          <label for="cmpLingDestino">Para:</label>
          <select id="cmpLingDestino">
            <option>JavaScript</option>
            <option>Python</option>
            <option>TypeScript</option>
            <option>Java</option>
            <option>C#</option>
            <option>C / C++</option>
            <option>PHP</option>
            <option>Ruby</option>
            <option>Go</option>
            <option>Shell / Bash</option>
            <option>HTML / CSS</option>
            <option>Kotlin</option>
            <option>Swift</option>
            <option>Rust</option>
            <option>SQL</option>
          </select>
        </div>
        <button id="btnCopiarCmp" class="btn-secondary">Copiar</button>
      </div>
      <div id="outputComparador" class="output-box cmp-output"></div>
    </div>
  </main>

  <!-- ── FOOTER ─────────────────────────────────────────────────────────── -->
  <footer>
    <div class="footer-left" id="footerTradutor">
      <button id="btnTraduzir" class="btn-primary">→ Traduzir</button>
      <button id="btnLimpar" class="btn-secondary">Limpar</button>
    </div>
    <div class="footer-left hidden" id="footerComparador">
      <button id="btnConverter" class="btn-primary">⇄ Converter</button>
      <button id="btnLimparCmp" class="btn-secondary">Limpar</button>
    </div>
    <span id="status" class="status"></span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
