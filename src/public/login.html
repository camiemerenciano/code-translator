<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Tradutor de Código</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <img src="logo.png" alt="Logo" class="logo-hero" />
  <div class="card">
    <div class="logo">&lt;/&gt;</div>
    <h1>Tradutor de Código</h1>
    <p class="subtitle">Faça login para continuar</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" minlength="6" />
      </div>

      <div id="errorMsg" class="error-msg hidden"></div>

      <button type="submit" id="btnSubmit" class="btn-submit">
        <span id="btnText">Entrar</span>
        <span id="btnLoader" class="loader hidden"></span>
      </button>
    </form>

    <!-- Formulário de recuperação (oculto por padrão) -->
    <form id="recoveryForm" onsubmit="handleRecovery(event)" class="hidden">
      <p class="recovery-info">Digite seu e-mail e enviaremos um link para redefinir sua senha.</p>
      <div class="field">
        <label for="recoveryEmail">E-mail</label>
        <input type="email" id="recoveryEmail" placeholder="seu@email.com" required autocomplete="email" />
      </div>
      <div id="recoveryMsg" class="hidden"></div>
      <button type="submit" id="btnRecovery" class="btn-submit">
        <span id="btnRecoveryText">Enviar link</span>
        <span id="btnRecoveryLoader" class="loader hidden"></span>
      </button>
    </form>

    <div class="footer-links">
      <p class="footer-link"><a href="#" id="linkForgot" onclick="toggleRecovery(event)">Esqueceu a senha?</a></p>
      <p class="footer-link">Não tem conta? <a href="/cadastro">Cadastre-se</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="login.js"></script>
</body>
</html>
